<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f8f8fa"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#fff" stroke="#e5e5ea" stroke-width="2"/>

  <!-- Logo -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="url(#og-grad)"/>
  <path d="M89 110h7l4-12 5 24 5-17 3 7h5l4-10 3 10h3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="125" cy="112" r="3.5" fill="#fff" opacity=".9"/>

  <!-- Text -->
  <text x="150" y="105" fill="#1a1a2e" font-size="28" font-weight="700" font-family="system-ui">PingMonitor</text>
  <text x="150" y="128" fill="#8e8ea0" font-size="14" font-family="system-ui">API Endpoint Monitoring</text>

  <!-- Main heading -->
  <text x="80" y="230" fill="#1a1a2e" font-size="52" font-weight="800" font-family="system-ui">Monitor APIs, websites</text>
  <text x="80" y="290" fill="#1a1a2e" font-size="52" font-weight="800" font-family="system-ui">& AI services in</text>
  <text x="80" y="350" fill="#6c5ce7" font-size="52" font-weight="800" font-family="system-ui">real-time</text>

  <!-- Features -->
  <text x="80" y="420" fill="#8e8ea0" font-size="20" font-family="system-ui">1-minute checks  ·  Instant alerts  ·  Beautiful dashboards  ·  20+ service integrations</text>

  <!-- URL -->
  <rect x="80" y="470" width="280" height="40" rx="10" fill="#6c5ce7"/>
  <text x="220" y="496" text-anchor="middle" fill="#fff" font-size="15" font-weight="600" font-family="system-ui">pingmonitor.yashai.me</text>

  <!-- Mini dashboard mockup on right -->
  <rect x="700" y="160" width="380" height="350" rx="16" fill="#f8f8fa" stroke="#e5e5ea" stroke-width="1.5"/>

  <!-- Stat cards -->
  <rect x="720" y="180" width="170" height="60" rx="10" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
  <text x="740" y="202" fill="#8e8ea0" font-size="11" font-family="system-ui">Uptime</text>
  <text x="740" y="228" fill="#00b894" font-size="22" font-weight="700" font-family="system-ui">99.9%</text>

  <rect x="900" y="180" width="160" height="60" rx="10" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
  <text x="920" y="202" fill="#8e8ea0" font-size="11" font-family="system-ui">Avg Response</text>
  <text x="920" y="228" fill="#1a1a2e" font-size="22" font-weight="700" font-family="system-ui">42ms</text>

  <!-- Monitor rows -->
  <rect x="720" y="260" width="340" height="40" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
  <circle cx="740" cy="280" r="5" fill="#00b894"/>
  <text x="756" y="284" fill="#1a1a2e" font-size="13" font-weight="600" font-family="system-ui">OpenAI</text>
  <text x="1040" y="284" text-anchor="end" fill="#00b894" font-size="12" font-weight="600" font-family="system-ui">Operational</text>

  <rect x="720" y="308" width="340" height="40" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
  <circle cx="740" cy="328" r="5" fill="#00b894"/>
  <text x="756" y="332" fill="#1a1a2e" font-size="13" font-weight="600" font-family="system-ui">Supabase</text>
  <text x="1040" y="332" text-anchor="end" fill="#00b894" font-size="12" font-weight="600" font-family="system-ui">200 OK</text>

  <rect x="720" y="356" width="340" height="40" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
  <circle cx="740" cy="376" r="5" fill="#00b894"/>
  <text x="756" y="380" fill="#1a1a2e" font-size="13" font-weight="600" font-family="system-ui">GitHub API</text>
  <text x="1040" y="380" text-anchor="end" fill="#00b894" font-size="12" font-weight="600" font-family="system-ui">200 OK</text>

  <!-- Mini bar chart -->
  <g>
    <rect x="720" y="476" width="16" height="24" rx="3" fill="#6c5ce7" opacity=".6"/>
    <rect x="742" y="468" width="16" height="32" rx="3" fill="#6c5ce7" opacity=".7"/>
    <rect x="764" y="472" width="16" height="28" rx="3" fill="#6c5ce7" opacity=".6"/>
    <rect x="786" y="464" width="16" height="36" rx="3" fill="#6c5ce7" opacity=".8"/>
    <rect x="808" y="470" width="16" height="30" rx="3" fill="#6c5ce7" opacity=".7"/>
    <rect x="830" y="460" width="16" height="40" rx="3" fill="#6c5ce7" opacity=".9"/>
    <rect x="852" y="466" width="16" height="34" rx="3" fill="#6c5ce7" opacity=".7"/>
    <rect x="874" y="458" width="16" height="42" rx="3" fill="#6c5ce7"/>
    <rect x="896" y="462" width="16" height="38" rx="3" fill="#6c5ce7" opacity=".8"/>
    <rect x="918" y="456" width="16" height="44" rx="3" fill="#00b894"/>
    <rect x="940" y="460" width="16" height="40" rx="3" fill="#00b894" opacity=".9"/>
  </g>
  <text x="720" y="452" fill="#8e8ea0" font-size="10" font-family="system-ui">Response Time (24h)</text>

  <defs>
    <linearGradient id="og-grad" x1="80" y1="80" x2="136" y2="136">
      <stop stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#4a3db0"/>
    </linearGradient>
  </defs>
</svg>
